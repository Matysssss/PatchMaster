<body class="bg-slate-950 text-slate-100 font-sans selection:bg-teal-500 selection:text-slate-950 min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- BASE DE DONNÉES INVENTAIRES ---
    const INVENTORIES = {

        ],
        micros: [
          { model: "Shure SM-57 (Wired)", qty: 12 },
          { model: "Shure SM-58 (Wired)", qty: 15 },
          { model: "Shure ULXD2 (Main HF)", qty: 21 },
          { model: "Shure ULXD1 (Pocket HF)", qty: 20 },
          { model: "Shure QLXD2 (Main HF)", qty: 4 },
          { model: "Shure QLXD1 (Pocket HF)", qty: 8 },
          { model: "Shure BLX2 (HF)", qty: 7 },
          { model: "DPA Re-fine 4488", qty: 10 },
          { model: "DPA 4066", qty: 4 },
          { model: "Shure MX153 T", qty: 2 },
          { model: "Shure MX412 court", qty: 7 },
          { model: "Shure MX412 long", qty: 5 },
          { model: "AudioTechnica AT837QML", qty: 2 },
          { model: "AudioTechnica AT8615", qty: 8 },
          { model: "AKG GN 30", qty: 2 },
          { model: "AKG DST 99 S", qty: 2 },
          { model: "Sennheiser SDC 8200 D", qty: 29 },
          { model: "Sennheiser SDC 8200 CU-M", qty: 1 },
          { model: "BSS AR-133 DI Active", qty: 10 },
          { model: "Radial ProDI (DI Passive)", qty: 8 }
        ],
        receiversStock: {
          ULXD4Q: 1,
          ULXD4D: 11,
          QLXD4: 8,
          BLX4: 7
        },
        pieds: [
          { id: "grand", label: "Grand Pied", qty: 25 },
          { id: "petit", label: "Petit Pied", qty: 18 },
          { id: "clamp", label: "Clamp", qty: 15 }
        ]
      }
    };

    const CATEGORY_ORDER = {
      batterie: 1,
      cajon: 2,
      basse: 3,
      guitare_electrique: 4,
      guitare_acoustique: 5,
      clavier: 6,
      piano: 7,
      vent: 8,
      vox: 9,   
      room: 10
    };

    const CATEGORY_LABELS = {
      batterie: "Batterie",
      cajon: "Cajon",
      basse: "Basse",
      guitare_electrique: "Guitare Électrique",
      guitare_acoustique: "Guitare Acoustique",
      clavier: "Clavier Synthé",
      piano: "Piano",
      vent: "Instrument à vent",
      vox: "Vox (Voix / Conférencier / Chant)", 
      room: "Prise Room"
    };

    const STAND_OPTIONS = [
      { id: 'aucun', label: 'Aucun / DI' },
      { id: 'petit', label: 'Petit Pied' },
      { id: 'grand', label: 'Grand Pied' },
      { id: 'clamp', label: 'Clamp' }
    ];

    function App() {
      // --- ETATS MODES & ONGLETS ---
      const [appMode, setAppMode] = useState('frequence'); 
      const [activeTab, setActiveTab] = useState('patchs'); 
      
      const [instruments, setInstruments] = useState([]);
      const [customName, setCustomName] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('vox'); 
      const [showResetModal, setShowResetModal] = useState(false);
      const [showCopyToast, setShowCopyToast] = useState(false);
      const [toastMessage, setToastMessage] = useState('');

      // Paramètres de longueurs par défaut configurables
      const [distShort, setDistShort] = useState(5);
      const [distMedium, setDistMedium] = useState(10);
      const [distLong, setDistLong] = useState(20);

      // Overrides manuels de l'utilisateur pour le câblage
      const [manualCableOverrides, setManualCableOverrides] = useState({});

      // Options formulaires IN
      const [acousticOption, setAcousticOption] = useState('di');
      const [electricOption, setElectricOption] = useState('multieffet_mono');
      const [electricMicsCount, setElectricMicsCount] = useState(1);
      const [synthOption, setSynthOption] = useState('stereo');
      const [pianoOption, setPianoOption] = useState('stereo');
      const [cajonOption, setCajonOption] = useState('deux_micros');
      
      const [drumMics, setDrumMics] = useState({
        kickIn: true, kickOut: true, snareTop: true, snareBot: true,
        hh: true, ride: true, tom1: true, tom2: true, tom3: false,
        ohJ: true, ohC: true
      });
      const [bassMics, setBassMics] = useState({ di: true, amp: false });

      // --- CONFIG OUT CONSOLE ---
      const [masterOutL, setMasterOutL] = useState(15);
      const [masterOutR, setMasterOutR] = useState(16);
      const [numMonitors, setNumMonitors] = useState(4);
      const [monitors, setMonitors] = useState([
        { id: 'm1', label: 'Wedge 1 (Chant)', isStereo: false },
        { id: 'm2', label: 'Wedge 2 (Guitare)', isStereo: false },
        { id: 'm3', label: 'Wedge 3 (Basse)', isStereo: false },
        { id: 'm4', label: 'Wedge 4 (Batteur)', isStereo: false }
      ]);

      // --- CONFIGURATION LISTE TECHNIQUE ---
      const [consoleModel, setConsoleModel] = useState('Allen & Heath SQ-6');
      const [soundSystem, setSoundSystem] = useState({
        main: { label: 'Système principal (Face L/R)', model: 'CODA HOPS8', qty: 4 },
        subs: { label: 'Subwoofers', model: 'CODA G15-SUB', qty: 2 },
        frontfills: { label: 'Front fills', model: 'Bose L1', qty: 2 },
        delays: { label: 'Rappels / Delays', model: '', qty: 0 },
        outfills: { label: 'Outfills', model: '', qty: 0 },
        infills: { label: 'Infills', model: '', qty: 0 },
        wedges: { label: 'Wedges (Retours de scène)', model: 'CODA HOPS5', qty: 4 },
        ears: { label: 'Ear Monitors (IEM)', model: '', qty: 0 }
      });
      const [amplifiers, setAmplifiers] = useState([{ id: 'amp-1', model: 'CODA LINUS 12C', qty: 2 }]);
      const [newAmpModel, setNewAmpModel] = useState('');
      const [newAmpQty, setNewAmpQty] = useState(1);

      // Failsafe micro préféré
      const getPreferredMic = (purpose) => {
        try {
          if (appMode === 'frequence') {
            if (purpose === 'vox' || purpose === 'voix') return 'Shure SM-58 (Wired)';
            if (purpose === 'kick_in' || purpose === 'kick_out' || purpose === 'snare_top' || purpose === 'snare_bot' || purpose === 'tom') return 'Shure SM-57 (Wired)';
            if (purpose === 'oh' || purpose === 'acoustic') return 'BSS AR-133 DI Active';
            if (purpose === 'di') return 'BSS AR-133 DI Active';
            return 'Shure SM-58 (Wired)';
          } else if (appMode === 'sonarion') {
            if (purpose === 'vox' || purpose === 'voix' || purpose === 'snare_top' || purpose === 'snare_bot') return 'Shure SM-57';
            if (purpose === 'kick_in') return 'Behringer C2'; 
            if (purpose === 'kick_out') return 'AKG D222';
            if (purpose === 'oh' || purpose === 'acoustic' || purpose === 'tom') return 'T.Bone SC140';
            if (purpose === 'di') return 'T.Bone SC140'; 
            return 'Shure SM-57';
          }
          return 'SM57';
        } catch (e) {
          return 'SM57';
        }
      };

      const getSuggestedStand = (category, subLabel = '') => {
        const label = subLabel.toLowerCase();
        if (category === 'vox') return 'grand'; 
        if (category === 'batterie') {
          if (label.includes('kick') || label.includes('snare') || label.includes('hh')) return 'petit';
          if (label.includes('tom')) return 'clamp';
          if (label.includes('oh') || label.includes('overhead')) return 'grand';
          return 'petit';
        }
        if (category === 'guitare_electrique') return 'petit';
        if (category === 'guitare_acoustique') return label.includes('di') ? 'aucun' : 'grand';
        if (category === 'clavier' || category === 'piano' && label.includes('di')) return 'aucun';
        if (category === 'piano') return 'grand';
        if (category === 'cajon') return 'petit';
        if (category === 'vent') return 'grand';
        if (category === 'room') return 'grand';
        return 'aucun';
      };

      // --- CRÉATION DE L'INSTRUMENT ---
      const handleAddInstrument = (e) => {
        e.preventDefault();
        const subChannels = [];
        const nameToUse = customName.trim() || CATEGORY_LABELS[selectedCategory];

        try {
          if (selectedCategory === 'vox') {
            subChannels.push({ 
              label: `Tranche Vox`, 
              stand: getSuggestedStand('vox'), 
              micModel: getPreferredMic('vox'), 
              needs48v: false, 
              isStereoPair: false 
            });
          } else if (selectedCategory === 'guitare_acoustique') {
            if (acousticOption === 'di') {
              subChannels.push({ 
                label: `DI Guitare`, 
                stand: 'aucun', 
                micModel: getPreferredMic('di'), 
                needs48v: appMode !== 'frequence', 
                isStereoPair: false 
              });
            } else if (acousticOption === 'micro') {
              subChannels.push({ 
                label: `Micro Guitare`, 
                stand: getSuggestedStand('guitare_acoustique', 'micro'), 
                micModel: getPreferredMic('acoustic'), 
                needs48v: true, 
                isStereoPair: false 
              });
            } else {
              subChannels.push({ 
                label: `Micro Guitare (L)`, 
                stand: 'grand', 
                micModel: getPreferredMic('acoustic'), 
                needs48v: true, 
                isStereoPair: true 
              });
              subChannels.push({ 
                label: `Micro Guitare (R)`, 
                stand: 'grand', 
                micModel: getPreferredMic('acoustic'), 
                needs48v: true, 
                isStereoPair: true 
              });
            }
          } else if (selectedCategory === 'guitare_electrique') {
            if (electricOption === 'multieffet_mono') {
              subChannels.push({ 
                label: `DI Multi-Effet (Mono)`, 
                stand: 'aucun', 
                micModel: getPreferredMic('di'), 
                needs48v: appMode !== 'frequence', 
                isStereoPair: false 
              });
            } else if (electricOption === 'multieffet_stereo') {
              subChannels.push({ 
                label: `DI Multi-Effet (L)`, 
                stand: 'aucun', 
                micModel: getPreferredMic('di'), 
                needs48v: appMode !== 'frequence', 
                isStereoPair: true 
              });
              subChannels.push({ 
                label: `DI Multi-Effet (R)`, 
                stand: 'aucun', 
                micModel: getPreferredMic('di'), 
                needs48v: appMode !== 'frequence', 
                isStereoPair: true 
              });
            } else if (electricOption === 'ampli') {
              for (let i = 1; i <= electricMicsCount; i++) {
                subChannels.push({ 
                  label: `Ampli (Mic ${i})`, 
                  stand: 'petit', 
                  micModel: getPreferredMic('snare_top'), 
                  needs48v: false, 
                  isStereoPair: false 
                });
              }
            } else if (electricOption === 'deux_amplis') {
              subChannels.push({ 
                label: `Ampli A (Mic)`, 
                stand: 'petit', 
                micModel: getPreferredMic('snare_top'), 
                needs48v: false, 
                isStereoPair: false 
              });
              subChannels.push({ 
                label: `Ampli B (Mic)`, 
                stand: 'petit', 
                micModel: getPreferredMic('snare_top'), 
                needs48v: false, 
                isStereoPair: false 
              });
            }
          } else if (selectedCategory === 'batterie') {
            if (drumMics.kickIn) subChannels.push({ label: 'Kick In', stand: 'petit', micModel: getPreferredMic('kick_in'), needs48v: true, isStereoPair: false });
            if (drumMics.kickOut) subChannels.push({ label: 'Kick Out', stand: 'petit', micModel: getPreferredMic('kick_out'), needs48v: false, isStereoPair: false });
            if (drumMics.snareTop) subChannels.push({ label: 'Snare Top', stand: 'petit', micModel: getPreferredMic('snare_top'), needs48v: false, isStereoPair: false });
            if (drumMics.snareBot) subChannels.push({ label: 'Snare Bot', stand: 'petit', micModel: getPreferredMic('snare_bot'), needs48v: false, isStereoPair: false });
            if (drumMics.hh) subChannels.push({ label: 'HH (Charley)', stand: 'petit', micModel: getPreferredMic('acoustic'), needs48v: true, isStereoPair: false });
            if (drumMics.tom1) subChannels.push({ label: 'Tom 1', stand: 'clamp', micModel: getPreferredMic('tom'), needs48v: false, isStereoPair: false });
            if (drumMics.tom2) subChannels.push({ label: 'Tom 2', stand: 'clamp', micModel: getPreferredMic('tom'), needs48v: false, isStereoPair: false });
            if (drumMics.tom3) subChannels.push({ label: 'Tom 3', stand: 'clamp', micModel: getPreferredMic('tom'), needs48v: false, isStereoPair: false });
            if (drumMics.ride) subChannels.push({ label: 'Ride', stand: 'petit', micModel: getPreferredMic('acoustic'), needs48v: true, isStereoPair: false });
            if (drumMics.ohJ && drumMics.ohC) {
              subChannels.push({ label: 'Overhead L (Jardin)', stand: 'grand', micModel: getPreferredMic('oh'), needs48v: true, isStereoPair: true });
              subChannels.push({ label: 'Overhead R (Cour)', stand: 'grand', micModel: getPreferredMic('oh'), needs48v: true, isStereoPair: true });
            } else {
              if (drumMics.ohJ) subChannels.push({ label: 'Overhead L (Jardin)', stand: 'grand', micModel: getPreferredMic('oh'), needs48v: true, isStereoPair: false });
              if (drumMics.ohC) subChannels.push({ label: 'Overhead R (Cour)', stand: 'grand', micModel: getPreferredMic('oh'), needs48v: true, isStereoPair: false });
            }
          } else if (selectedCategory === 'clavier') {
            if (synthOption === 'mono') {
              subChannels.push({ label: `DI Clavier (Mono)`, stand: 'aucun', micModel: getPreferredMic('di'), needs48v: false, isStereoPair: false });
            } else {
              subChannels.push({ label: `DI Clavier (L)`, stand: 'aucun', micModel: getPreferredMic('di'), needs48v: appMode !== 'frequence', isStereoPair: true });
              subChannels.push({ label: `DI Clavier (R)`, stand: 'aucun', micModel: getPreferredMic('di'), needs48v: appMode !== 'frequence', isStereoPair: true });
            }
          } else if (selectedCategory === 'piano') {
            if (pianoOption === 'mono') {
              subChannels.push({ label: `Micro Piano (Mono)`, stand: 'grand', micModel: getPreferredMic('acoustic'), needs48v: true, isStereoPair: false });
            } else if (pianoOption === 'stereo') {
              subChannels.push({ label: `Micro Piano (L)`, stand: 'grand', micModel: getPreferredMic('acoustic'), needs48v: true, isStereoPair: true });
              subChannels.push({ label: `Micro Piano (R)`, stand: 'grand', micModel: getPreferredMic('acoustic'), needs48v: true, isStereoPair: true });
            } else {
              subChannels.push({ label: `Micro Piano (L)`, stand: 'grand', micModel: getPreferredMic('acoustic'), needs48v: true, isStereoPair: true });
              subChannels.push({ label: `Micro Piano (R)`, stand: 'grand', micModel: getPreferredMic('acoustic'), needs48v: true, isStereoPair: true });
              subChannels.push({ label: `Micro Piano Grave`, stand: 'petit', micModel: getPreferredMic('kick_out'), needs48v: false, isStereoPair: false });
            }
          } else if (selectedCategory === 'basse') {
            if (bassMics.di) subChannels.push({ label: `DI Basse`, stand: 'aucun', micModel: getPreferredMic('di'), needs48v: appMode !== 'frequence', isStereoPair: false });
            if (bassMics.amp) subChannels.push({ label: `Micro Ampli Basse`, stand: 'petit', micModel: 'SM57', needs48v: false, isStereoPair: false });
          } else if (selectedCategory === 'cajon') {
            if (cajonOption === 'un_micro') {
              subChannels.push({ label: `Micro Cajon (Event)`, stand: 'petit', micModel: getPreferredMic('kick_in'), needs48v: true, isStereoPair: false });
            } else {
              subChannels.push({ label: `Micro Cajon (Face)`, stand: 'petit', micModel: getPreferredMic('snare_top'), needs48v: false, isStereoPair: false });
              subChannels.push({ label: `Micro Cajon (Event)`, stand: 'petit', micModel: getPreferredMic('kick_out'), needs48v: false, isStereoPair: false });
            }
          } else if (selectedCategory === 'vent') {
            subChannels.push({ label: `Micro Vent`, stand: 'grand', micModel: 'SM57', needs48v: false, isStereoPair: false });
          } else if (selectedCategory === 'room') {
            subChannels.push({ label: `Micro Room L`, stand: 'grand', micModel: getPreferredMic('oh'), needs48v: true, isStereoPair: true });
            subChannels.push({ label: `Micro Room R`, stand: 'grand', micModel: getPreferredMic('oh'), needs48v: true, isStereoPair: true });
          }

          setInstruments([...instruments, { id: 'inst-' + Date.now(), category: selectedCategory, customName: nameToUse, channels: subChannels }]);
          setCustomName('');
          triggerToast(`Instrument "${nameToUse}" ajouté.`);
        } catch (err) {
          console.error("Erreur ajout", err);
        }
      };

      const handleUpdateChannelField = (instId, chanIdx, field, value) => {
        setInstruments(prev => prev.map(inst => inst.id === instId ? { ...inst, channels: inst.channels.map((c, i) => i === chanIdx ? { ...c, [field]: value } : c) } : inst));
      };
      
      const handleNumMonitorsChange = (val) => {
        const nextNum = Math.max(0, parseInt(val, 10) || 0); setNumMonitors(nextNum);
        if (nextNum > monitors.length) {
          const newMons = [...monitors];
          for (let i = monitors.length + 1; i <= nextNum; i++) newMons.push({ id: `m-new-${Date.now()}-${i}`, label: `Wedge ${i}`, isStereo: false });
          setMonitors(newMons);
        } else setMonitors(monitors.slice(0, nextNum));
      };
      
      const handleMonitorChange = (id, fields) => setMonitors(monitors.map(m => m.id === id ? { ...m, ...fields } : m));
      const handleSoundSysChange = (key, field, value) => setSoundSystem(prev => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
      const handleAddAmplifier = (e) => {
        e.preventDefault(); if (!newAmpModel.trim()) return;
        setAmplifiers(prev => [...prev, { id: 'amp-' + Date.now(), model: newAmpModel.trim(), qty: Math.max(1, newAmpQty) }]);
        setNewAmpModel(''); setNewAmpQty(1);
      };
      const handleRemoveAmplifier = (id) => setAmplifiers(prev => prev.filter(amp => amp.id !== id));
      const handleUpdateAmplifierQty = (id, newQty) => setAmplifiers(prev => prev.map(amp => amp.id === id ? { ...amp, qty: Math.max(1, parseInt(newQty, 10) || 1) } : amp));

      // --- TRI CONSOLE ---
      const sortedInstruments = useMemo(() => {
        return [...instruments].sort((a, b) => (CATEGORY_ORDER[a.category] || 99) - (CATEGORY_ORDER[b.category] || 99));
      }, [instruments]);

      const patchInList = useMemo(() => {
        const flatInputList = [];
        sortedInstruments.forEach(inst => {
          inst.channels.forEach((chan, index) => {
            flatInputList.push({
              instrumentId: inst.id, instrumentName: inst.customName, category: inst.category,
              channelIndex: index, channelLabel: chan.label, stand: chan.stand,
              micModel: chan.micModel || '', needs48v: !!chan.needs48v, isStereoPair: !!chan.isStereoPair
            });
          });
        });

        const alignedList = []; let currentCh = 1;
        for (let i = 0; i < flatInputList.length; i++) {
          const current = flatInputList[i]; const next = flatInputList[i + 1];
          const isTrueStereoCouple = current.isStereoPair && next && next.isStereoPair && current.instrumentId === next.instrumentId;

          if (isTrueStereoCouple) {
            if (currentCh % 2 === 0) {
              alignedList.push({ ch: currentCh, isGap: true, channelLabel: "[Alignement Stéréo]", instrumentName: "RESERVE", category: "system", stand: "aucun", micModel: "CANAL VIDE", needs48v: false, isStereoPair: false });
              currentCh++;
            }
            alignedList.push({ ...current, ch: currentCh }); currentCh++;
            alignedList.push({ ...next, ch: currentCh }); currentCh++; i++;
          } else {
            alignedList.push({ ...current, ch: currentCh }); currentCh++;
          }
        }
        return alignedList;
      }, [sortedInstruments]);

      const patchOutList = useMemo(() => {
        let currentOut = 1; const list = [];
        monitors.forEach((mon) => {
          if (mon.isStereo) {
            if (currentOut % 2 === 0) { list.push({ isGap: true, outChannels: [currentOut], label: "[Alignement Port]", type: 'Reserved', format: 'Vide' }); currentOut += 1; }
            list.push({ id: mon.id, outChannels: [currentOut, currentOut + 1], label: mon.label, type: 'Retour', format: 'Stéréo' }); currentOut += 2;
          } else {
            list.push({ id: mon.id, outChannels: [currentOut], label: mon.label, type: 'Retour', format: 'Mono' }); currentOut += 1;
          }
        });
        return { monitorsList: list, masterOut: { channels: [parseInt(masterOutL, 10) || 15, parseInt(masterOutR, 10) || 16], label: 'Master Stéréo', type: 'Master' } };
      }, [monitors, masterOutL, masterOutR]);

      // --- CALCUL MATERIEL ---
      const dynamicMicEquipment = useMemo(() => {
        const counts = {};
        patchInList.forEach(item => {
          if (item.isGap) return;
          const mic = (item.micModel || '').trim();
          if (mic) counts[mic] = (counts[mic] || 0) + 1;
        });
        return Object.entries(counts).map(([model, qty]) => {
          let stockLimit = null;
          if (appMode !== 'manuel') {
            const matchInInvent = INVENTORIES[appMode].micros.find(m => m.model.toLowerCase() === model.toLowerCase());
            if (matchInInvent) stockLimit = matchInInvent.qty;
          }
          return { model, qty, stockLimit };
        });
      }, [patchInList, appMode]);

      // --- OPTIMISATION RACKS RECEPTEURS HF ---
      const dynamicWirelessReceivers = useMemo(() => {
        if (appMode !== 'frequence') return [];
        let countULX = 0, countQLX = 0, countBLX = 0;
        patchInList.forEach(item => {
          if (item.isGap) return;
          const m = item.micModel;
          if (m.includes("ULXD1") || m.includes("ULXD2")) countULX++;
          if (m.includes("QLXD1") || m.includes("QLXD2")) countQLX++;
          if (m.includes("BLX2")) countBLX++;
        });
        const recs = [];
        if (countULX > 0) {
          let rem = countULX;
          let q = 0;
          if (rem >= 3 && INVENTORIES.frequence.receiversStock.ULXD4Q > 0) {
            q = 1;
            rem = Math.max(0, rem - 4);
          }
          let d = rem > 0 ? Math.ceil(rem/2) : 0;
          if (q > 0) recs.push({ model: "Shure ULXD4Q", qty: q, stockLimit: INVENTORIES.frequence.receiversStock.ULXD4Q });
          if (d > 0) recs.push({ model: "Shure ULXD4D", qty: d, stockLimit: INVENTORIES.frequence.receiversStock.ULXD4D });
        }
        if (countQLX > 0) recs.push({ model: "Shure QLXD4", qty: countQLX, stockLimit: INVENTORIES.frequence.receiversStock.QLXD4 });
        if (countBLX > 0) recs.push({ model: "Shure BLX4", qty: countBLX, stockLimit: INVENTORIES.frequence.receiversStock.BLX4 });
        return recs;
      }, [patchInList, appMode]);

      const dynamicStandEquipment = useMemo(() => {
        const counts = { petit: 0, grand: 0, clamp: 0 };
        patchInList.forEach(item => { if (!item.isGap && counts[item.stand] !== undefined) counts[item.stand]++; });
        const activeStandsInvent = appMode !== 'manuel' ? INVENTORIES[appMode].pieds : null;
        return [
          { id: 'grand', label: 'Grand Pied', qty: counts.grand, stockLimit: activeStandsInvent ? activeStandsInvent.find(p => p.id === 'grand')?.qty : null },
          { id: 'petit', label: 'Petit Pied', qty: counts.petit, stockLimit: activeStandsInvent ? activeStandsInvent.find(p => p.id === 'petit')?.qty : null },
          { id: 'clamp', label: 'Clamp de scène', qty: counts.clamp, stockLimit: activeStandsInvent ? activeStandsInvent.find(p => p.id === 'clamp')?.qty : null }
        ].filter(p => p.qty > 0);
      }, [patchInList, appMode]);

      // --- CALCUL DU CÂBLAGE INTELLIGENT AVEC CHARGE PC16 AUTO POUR LES SYSTEMES AMPLIFIÉS ---
      const computedCablingList = useMemo(() => {
        let totalXlrShort = 0;  
        let totalXlrMedium = 0; 
        let totalJackScen = 0;  
        let powerPrisesCount = 1; // 1 prise de base pour la console FOH

        patchInList.forEach(item => {
          if (item.isGap) return;
          const isDI = item.channelLabel.toLowerCase().includes("di") || item.micModel.toLowerCase().includes("radial") || item.micModel.toLowerCase().includes("bss") || item.micModel.toLowerCase().includes("di");
          const isWiredMicro = !isDI && !item.micModel.includes("HF") && !item.micModel.includes("ULXD") && !item.micModel.includes("QLXD") && item.micModel !== "";

          if (isWiredMicro) {
            if (item.category === 'batterie' || item.category === 'cajon' || item.channelLabel.toLowerCase().includes("ampli")) {
              totalXlrShort++;
            } else {
              totalXlrMedium++;
            }
          }

          if (isDI) {
            totalJackScen++;  
            totalXlrShort++;  
          }
        });

        let totalXlrLong = 0; 
        patchOutList.monitorsList.forEach(m => {
          if (m.format !== 'Vide') {
            totalXlrLong += m.outChannels.length;
          }
        });
        totalXlrLong += 2; // Master Face

        // ALGORITHME ÉLECTRIQUE LOGIQUE
        powerPrisesCount += 1; // Régie
        amplifiers.forEach(a => powerPrisesCount += a.qty);
        dynamicWirelessReceivers.forEach(r => powerPrisesCount += r.qty);
        
        // RECONNAISSANCE ET RECOMPTE ÉLECTRIQUE DÉDIÉ DES ENCEINTES ACTIVES (Bose L1, Mackie SRM-Flex, CODA etc.)
        Object.values(soundSystem).forEach(s => {
          if (s.model && s.qty > 0) {
            powerPrisesCount += s.qty; // 1 Prise PC16 par enceinte
          }
        });

        const formatItem = (key, label, baseQty, lengthUnit) => {
          const autoQtyWithSpare = Math.ceil(baseQty * 1.2); 
          const finalQty = manualCableOverrides[key] !== undefined ? manualCableOverrides[key] : autoQtyWithSpare;
          return { key, label, autoQty: autoQtyWithSpare, finalQty, lengthUnit };
        };

        const autoMultiprises = Math.ceil(powerPrisesCount / 4); 
        const autoRallonges10m = Math.ceil(powerPrisesCount / 2);

        return [
          formatItem('xlr_5m', `Câble XLR Audio Mâle/Femelle (Liaison courte - ${distShort}m)`, totalXlrShort, `${distShort}m`),
          formatItem('xlr_10m', `Câble XLR Audio Mâle/Femelle (Liaison scène - ${distMedium}m)`, totalXlrMedium, `${distMedium}m`),
          formatItem('xlr_20m', `Ligne XLR Modulation / Retours (Liaison régie - ${distLong}m)`, totalXlrLong, `${distLong}m`),
          formatItem('jack_3m', `Câble Jack instrument Jack/Jack 6.35mm (Scène - 3m)`, totalJackScen, "3m"),
          formatItem('elec_multi', `Bloc Multiprise PC16 (4 à 6 directions standard)`, autoMultiprises, "Scène/Régie"),
          formatItem('elec_rallonge', `Rallonge électrique prolongateur PC16 (Forfait terrain - 10m)`, autoRallonges10m, "10m")
        ];
      }, [patchInList, patchOutList, amplifiers, dynamicWirelessReceivers, soundSystem, distShort, distMedium, distLong, manualCableOverrides]);

      const consoleStockStatus = useMemo(() => {
        if (appMode === 'manuel') return { isOverStock: false };
        const found = INVENTORIES[appMode].consoles.find(c => c.model === consoleModel);
        return found ? { isOverStock: false, limit: found.qty } : { isOverStock: true, limit: 0 };
      }, [consoleModel, appMode]);

      const ampStockStatus = useMemo(() => {
        const status = {};
        amplifiers.forEach(amp => {
          if (appMode === 'manuel') return;
          const found = INVENTORIES[appMode].amplis.find(a => a.model === amp.model);
          status[amp.id] = (!found || amp.qty > found.qty) ? { isOverStock: true, limit: found ? found.qty : 0 } : { isOverStock: false };
        });
        return status;
      }, [amplifiers, appMode]);

      const speakerStockStatus = useMemo(() => {
        const status = {};
        Object.entries(soundSystem).forEach(([key, info]) => {
          if (appMode === 'manuel' || !info.model) return;
          const found = INVENTORIES[appMode].enceintes.find(e => e.model === info.model);
          status[key] = (!found || info.qty > found.qty) ? { isOverStock: true, limit: found ? found.qty : 0 } : { isOverStock: false };
        });
        return status;
      }, [soundSystem, appMode]);

      const outputConflicts = useMemo(() => {
        const usedOuts = {};
        const conflicts = [];
        patchOutList.monitorsList.forEach((item) => {
          item.outChannels.forEach(p => {
            if (item.type === 'Retour') {
              if (usedOuts[p]) conflicts.push(`La sortie OUT ${p} est réclamée plusieurs fois.`);
              usedOuts[p] = `Retour: ${item.label}`;
            }
          });
        });
        const mL = parseInt(masterOutL, 10);
        const mR = parseInt(masterOutR, 10);
        if (usedOuts[mL]) conflicts.push(`Le Master L (OUT ${mL}) écrase la sortie de retour : "${usedOuts[mL]}".`);
        if (usedOuts[mR]) conflicts.push(`Le Master R (OUT ${mR}) écrase la sortie de retour : "${usedOuts[mR]}".`);
        if (mL === mR) conflicts.push(`Les canaux Master L et R sont identiques (${mL}).`);
        if (mL % 2 !== 1 || mR !== mL + 1) conflicts.push(`ℹ️ Conseil : Le Master L/R de la face est habituellement branché sur une paire Impair/Pair (ex: 15-16).`);
        return conflicts;
      }, [patchOutList, masterOutL, masterOutR]);

      const triggerToast = (msg) => {
        setToastMessage(msg); setShowCopyToast(true);
      };

      const handleUpdateOverride = (key, val) => {
        setManualCableOverrides(prev => ({ ...prev, [key]: Math.max(0, parseInt(val, 10) || 0) }));
      };

      const handleCopyToClipboard = () => {
        let text = "=== FICHE DE PATCH CONSOLE LIVE ===\n";
        text += `Console : ${consoleModel || 'Non spécifiée'}\n\n`;
        text += "--- PATCH D'ENTRÉES (PATCH IN) ---\n";
        
        if (patchInList.length === 0) {
          text += "Aucune entrée configurée.\n";
        } else {
          patchInList.forEach(item => {
            if (item.isGap) {
              text += `In ${String(item.ch).padStart(2, '0')} | [---] ${item.channelLabel}\n`;
            } else {
              const standLabel = STAND_OPTIONS.find(s => s.id === item.stand)?.label || 'Aucun';
              const phantom = item.needs48v ? " [+48V]" : "";
              const mic = item.micModel ? ` (Mic: ${item.micModel}${phantom})` : "";
              const channelLabelWithMic = `${item.channelLabel}${mic}`;
              text += `In ${String(item.ch).padStart(2, '0')} | ${channelLabelWithMic.padEnd(55)} | ${standLabel}\n`;
            }
          });
        }

        text += "\n--- PATCH DE SORTIES (PATCH OUT) ---\n";
        if (patchOutList.monitorsList.length === 0) {
          text += "Aucun retour configuré.\n";
        } else {
          patchOutList.monitorsList.forEach(m => {
            if (m.format !== 'Vide') {
              text += `${m.outChannels.map(c => `OUT ${c}`).join(' + ').padEnd(12)} | ${m.label}\n`;
            }
          });
        }
        text += `\nSortie Master L : OUT ${masterOutL}\nSortie Master R : OUT ${masterOutR}\n`;
        copyTextHelper(text);
        triggerToast("Fiche de patch copiée !");
      };

      const handleCopyEquipmentList = () => {
        let text = "=== LISTE DE MATÉRIEL TECHNIQUE ===\n";
        text += `• 1x Console : ${consoleModel || 'Non spécifiée'}\n\n--- DIFFUSION ---\n`;
        Object.entries(soundSystem).forEach(([k, v]) => { if (v.model && v.qty > 0) text += `• ${v.qty}x ${v.label} : ${v.model}\n`; });
        if (amplifiers.length > 0) { text += `\n--- AMPLIFICATEURS ---\n`; amplifiers.forEach(a => { text += `• ${a.qty}x ${a.model}\n`; }); }
        text += `\n--- AMPLIFICATEURS ---\n`;
        dynamicMicEquipment.forEach(m => { text += `• ${m.qty}x ${m.model}\n`; });
        if (dynamicWirelessReceivers.length > 0) { text += `\n--- RECEPTEURS HF CALCULES ---\n`; dynamicWirelessReceivers.forEach(r => { text += `• ${r.qty}x ${r.model}\n`; }); }
        text += `\n--- PIEDS ---\n`;
        dynamicStandEquipment.forEach(s => { text += `• ${s.qty}x ${s.label}\n`; });
        copyTextHelper(text);
        triggerToast("Liste de matériel copiée !");
      };

      return (
        <div className="min-h-screen flex flex-col justify-between">
          
          {/* CONFIRMATION DE RESET DE LA SCÈNE */}
          {showResetModal && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative overflow-hidden animate-fadeIn">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-500 to-amber-500"></div>
                <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2 mb-2">🗑️ Tout effacer ?</h3>
                <p className="text-sm text-slate-400 mb-6">Es-tu sûr de vouloir réinitialiser tout ton patch, matériel et câblage ?</p>
                <div className="flex items-center justify-end gap-3">
                  <button onClick={() => setShowResetModal(false)} className="px-4 py-2 bg-slate-800 text-xs font-semibold rounded-lg text-slate-300">Annuler</button>
                  <button onClick={() => { setInstruments([]); setMonitors([]); setNumMonitors(0); setManualCableOverrides({}); setShowResetModal(false); triggerToast("Vidé."); }} className="px-4 py-2 bg-red-600 text-xs font-semibold rounded-lg text-white">Effacer</button>
                </div>
              </div>
            </div>
          )}

          {/* HEADER */}
          <header className="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40 px-4 py-3">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-gradient-to-tr from-teal-500 to-indigo-600 p-2.5 rounded-xl">
                  <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-xl font-extrabold tracking-tight bg-gradient-to-r from-teal-400 to-indigo-300 bg-clip-text text-transparent">PatchMaster Live</h1>
                  <p className="text-xs text-slate-400">Générateur Automatique de Patch Console Son pour Boîte de Presta</p>
                </div>
              </div>
              <button onClick={() => setShowResetModal(true)} className="text-xs px-4 py-2 bg-red-950/40 hover:bg-red-900/60 active:scale-95 transform transition-all duration-100 text-red-300 rounded-xl border border-red-900/50 font-bold">🗑️ Vider la Scène</button>
            </div>
          </header>

          {/* SÉLECTEURS DE MODE TECHNIQUE */}
          <div className="bg-slate-900/40 border-b border-slate-900 py-3">
            <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4">
              <div className="flex flex-wrap items-center gap-2">
                <button onClick={() => setActiveTab('patchs')} className={`px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transform transition-all duration-150 ${activeTab === 'patchs' ? 'bg-teal-500 text-slate-950 shadow-lg font-black' : 'bg-slate-900 text-slate-400'}`}>🎛️ Régie & Patchs (IN / OUT)</button>
                <button onClick={() => setActiveTab('materiel')} className={`px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transform transition-all duration-150 ${activeTab === 'materiel' ? 'bg-teal-500 text-slate-950 shadow-lg font-black' : 'bg-slate-900 text-slate-400'}`}>📦 Liste de Matériel</button>
                <button onClick={() => setActiveTab('cablage')} className={`px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transform transition-all duration-150 ${activeTab === 'cablage' ? 'bg-teal-500 text-slate-950 shadow-lg font-black' : 'bg-slate-900 text-slate-400'}`}>🔌 Plan de Câblage & Elec</button>
              </div>

              <div className="flex flex-wrap items-center gap-1.5 bg-slate-900 p-1.5 rounded-xl border border-slate-800">
                <span className="text-[10px] text-slate-500 font-bold px-2 uppercase">Mode d'inventaire :</span>
                <button type="button" onClick={() => setAppMode('manuel')} className={`px-3 py-1 rounded-lg text-xs font-bold ${appMode === 'manuel' ? 'bg-slate-800 text-slate-100' : 'text-slate-400'}`}>👐 Saisie Libre</button>
                <button type="button" onClick={() => setAppMode('sonarion')} className={`px-3 py-1 rounded-lg text-xs font-extrabold flex items-center gap-1.5 ${appMode === 'sonarion' ? 'bg-red-500/20 text-red-400 border border-red-500/40' : 'text-slate-400'}`}><span className="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>Parc Sonarion</button>
                <button type="button" onClick={() => setAppMode('frequence')} className={`px-3 py-1 rounded-lg text-xs font-extrabold flex items-center gap-1.5 ${appMode === 'frequence' ? 'bg-blue-500/20 text-blue-400 border border-blue-500/40' : 'text-slate-400'}`}><span className="h-2 w-2 rounded-full bg-blue-500 animate-pulse"></span>Parc Fréquence</button>
              </div>
            </div>
          </div>

          {/* DASHBOARD BODY */}
          <main className="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
            
            {activeTab === 'patchs' && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fadeIn">
                <div className="lg:col-span-5 space-y-8">
                  
                  {/* AJOUT INSTRUMENT */}
                  <section className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl text-left">
                    <h2 className="text-lg font-bold text-slate-100 mb-4">1. Ajouter un Instrument (Patch IN)</h2>
                    <form onSubmit={handleAddInstrument} className="space-y-4">
                      <div>
                        <label className="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Catégorie</label>
                        <select value={selectedCategory} onChange={(e) => setSelectedCategory(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-slate-200 text-sm focus:outline-none focus:border-teal-500">
                          {Object.entries(CATEGORY_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Nom personnalisé / Repère scène</label>
                        <input type="text" placeholder="Ex: Micro Main HF, Orateur Principal..." value={customName} onChange={(e) => setCustomName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-teal-500" />
                      </div>

                      {/* OPTIONS FORMULAIRES DYNAMIQUES */}
                      {selectedCategory === 'guitare_acoustique' && (
                        <div className="bg-slate-950/60 p-4 rounded-xl space-y-2"><span className="text-xs text-teal-400 font-bold block">Reprise :</span>
                          <div className="grid grid-cols-3 gap-2">
                            {[{id:'di', l:'🔌 DI'}, {id:'micro', l:'🎙️ 1 Mic'}, {id:'deux_micros', l:'🎙️🎙️ 2 Mics'}].map(o => <button key={o.id} type="button" onClick={() => setAcousticOption(o.id)} className={`text-xs p-2 rounded-lg border active:scale-95 transform transition-transform ${acousticOption === o.id ? 'bg-teal-500/10 border-teal-500 text-teal-300' : 'bg-slate-900 border-slate-850'}`}>{o.l}</button>)}
                          </div>
                        </div>
                      )}
                      {selectedCategory === 'guitare_electrique' && (
                        <div className="bg-slate-950/60 p-4 rounded-xl space-y-3"><span className="text-xs text-teal-400 font-bold block">Option :</span>
                          <div className="grid grid-cols-2 gap-2">
                            {[{id:'multieffet_mono', l:'🎛️ Multi Mono'}, {id:'multieffet_stereo', l:'🎛️ Multi St'}, {id:'ampli', l:'🔊 1 Ampli'}, {id:'deux_amplis', l:'🔊🔊 2 Amplis'}].map(o => <button key={o.id} type="button" onClick={() => setElectricOption(o.id)} className={`text-xs p-2 rounded-lg border active:scale-95 transform transition-transform ${electricOption === o.id ? 'bg-teal-500/10 border-teal-500 text-teal-300' : 'bg-slate-900 border-slate-850'}`}>{o.l}</button>)}
                          </div>
                          {electricOption === 'ampli' && <div className="flex justify-between items-center text-xs text-slate-400 pt-2 border-t border-slate-800"><span>Nombre de micros :</span><div className="flex gap-1">{[1,2,3].map(n => <button key={n} type="button" onClick={() => setElectricMicsCount(n)} className={`w-7 h-7 rounded font-bold active:scale-95 transform transition-transform ${electricMicsCount === n ? 'bg-teal-500 text-slate-950' : 'bg-slate-950'}`}>{n}</button>)}</div></div>}
                        </div>
                      )}
                      {selectedCategory === 'clavier' && (
                        <div className="bg-slate-950/60 p-4 rounded-xl space-y-2"><span className="text-xs text-teal-400 font-bold block">Sortie :</span>
                          <div className="grid grid-cols-2 gap-2">
                            {[{id:'mono', l:'🔲 Mono'}, {id:'stereo', l:'🔳 Stéréo'}].map(o => <button key={o.id} type="button" onClick={() => setSynthOption(o.id)} className={`text-xs p-2 rounded-lg border active:scale-95 transform transition-transform ${synthOption === o.id ? 'bg-teal-500/10 border-teal-500 text-teal-300' : 'bg-slate-900 border-slate-850'}`}>{o.l}</button>)}
                          </div>
                        </div>
                      )}
                      {selectedCategory === 'piano' && (
                        <div className="bg-slate-950/60 p-4 rounded-xl space-y-2"><span className="text-xs text-teal-400 font-bold block">Captation :</span>
                          <div className="grid grid-cols-3 gap-2">
                            {[{id:'mono', l:'🎙️ Mono'}, {id:'stereo', l:'🎙️ St'}, {id:'stereo_grave', l:'🎹 St+Grv'}].map(o => <button key={o.id} type="button" onClick={() => setPianoOption(o.id)} className={`text-xs p-2 rounded-lg border active:scale-95 transform transition-transform ${pianoOption === o.id ? 'bg-teal-500/10 border-teal-500 text-teal-300' : 'bg-slate-900 border-slate-850'}`}>{o.l}</button>)}
                          </div>
                        </div>
                      )}
                      {selectedCategory === 'basse' && (
                        <div className="bg-slate-950/60 p-4 rounded-xl grid grid-cols-2 gap-2">
                          <label className="flex items-center gap-2 bg-slate-900 p-2.5 border border-slate-800 rounded-xl text-xs cursor-pointer"><input type="checkbox" checked={bassMics.di} onChange={(e) => setBassMics({ ...bassMics, di: e.target.checked })} className="text-teal-500 bg-slate-950" /><span>Prise DI</span></label>

                        </div>
                      </div>

                      <div className="bg-slate-950 p-4 rounded-xl border border-slate-850 space-y-2 px-4 py-3"><span className="text-[10px] uppercase font-black text-slate-500">Pieds</span>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                          {dynamicStandEquipment.map(s => {
                            const err = s.stockLimit !== null && s.qty > s.stockLimit;
                            return (
                              <div key={s.id} className="bg-slate-900/60 p-2.5 rounded-lg flex justify-between items-center border">
                                <span>{s.label}</span>
                                <span className={`font-black px-2 py-1 rounded-lg border shrink-0 ${err?'text-red-400 bg-red-950 border-red-900':'text-amber-300 bg-amber-950 border-amber-900/20'}`}>{s.qty} u.</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ONGLET 3 : CÂBLAGE */}
            {activeTab === 'cablage' && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fadeIn">
                
                {/* CONFIGURATEUR DISTANCES TERRAIN */}
                <div className="lg:col-span-4 space-y-6">
                  <section className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl space-y-4 text-left">
                    <h3 className="text-md font-bold text-slate-100 flex items-center gap-2">📐 Longueurs Théoriques</h3>
                    <p className="text-[11px] text-slate-400 italic font-medium">Ajuste les longueurs forfaitaires calculées pour s'adapter à la taille de ton lieu.</p>
                    
                    <div className="space-y-4 pt-2">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Liaisons Courtes (Forfait Scène / Backline)</label>
                        <div className="flex gap-2 items-center">
                          <input type="number" value={distShort} onChange={e => setDistShort(Math.max(1, parseInt(e.target.value, 10)||5))} className="w-20 bg-slate-950 border border-slate-850 rounded-xl text-center font-bold text-sm py-1.5 text-teal-400 outline-none focus:border-teal-500 transition-all duration-150"/> 
                          <span className="text-xs text-slate-400 font-semibold">mètres par câble</span>
                        </div>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Liaisons Moyennes (Forfait Scène → Stagebox)</label>
                        <div className="flex gap-2 items-center">
                          <input type="number" value={distMedium} onChange={e => setDistMedium(Math.max(1, parseInt(e.target.value, 10)||10))} className="w-20 bg-slate-950 border border-slate-850 rounded-xl text-center font-bold text-sm py-1.5 text-teal-400 outline-none focus:border-teal-500 transition-all duration-150"/> 
                          <span className="text-xs text-slate-400 font-semibold">mètres par câble</span>
                        </div>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Liaisons Longues (Forfait Scène → Régie FOH)</label>
                        <div className="flex gap-2 items-center">
                          <input type="number" value={distLong} onChange={e => setDistLong(Math.max(1, parseInt(e.target.value, 10)||20))} className="w-20 bg-slate-950 border border-slate-850 rounded-xl text-center font-bold text-sm py-1.5 text-teal-400 outline-none focus:border-teal-500 transition-all duration-150"/> 
                          <span className="text-xs text-slate-400 font-semibold">mètres par câble</span>
                        </div>
                      </div>
                    </div>
                  </section>

                  <div className="bg-gradient-to-tr from-slate-900 to-indigo-950 border border-slate-850 p-5 rounded-2xl space-y-2 text-left shadow-lg">
                    <span className="text-xs font-black text-indigo-400 uppercase tracking-wider block">🛡️ Coefficient de Sécurité (+20%)</span>
                    <p className="text-[11px] text-slate-400 leading-relaxed">Pour parer à toutes pannes ou rallongements inattendus, la colonne <b>Suggéré (+20%)</b> rajoute systématiquement 20% d'unités de sécurité (spare) sur tous tes besoins physiques.</p>
                  </div>
                </div>

                <div className="lg:col-span-8">
                  <section className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl space-y-6">
                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-4 border-b border-slate-800 pb-3">
                      <div>
                        <h2 className="text-md font-bold text-white text-left">🔌 Plan de Câblage Audio & Électrique</h2>
                        <p className="text-xs text-slate-400 text-left">L'électricité compte automatiquement 1 PC16 pour chaque équipement actif recensé dans l'onglet matériel.</p>
                      </div>
                      <button onClick={() => {
                        let txt = "=== PLAN DE CÂBLAGE TECHNIQUE SON ===\n\n";
                        computedCablingList.forEach(c => { txt += `• [${c.lengthUnit}] - Quantité: ${c.finalQty} u. | ${c.label}\n`; });
                        copyTextHelper(txt); triggerToast("Liste de câblage copiée !");
                      }} className="bg-slate-800 border border-slate-700 text-xs text-slate-200 px-4 py-2.5 rounded-xl font-bold active:scale-95 transform transition-all duration-150 flex items-center justify-center gap-1">📋 Copier la liste de câblage</button>
                    </div>

                    <div className="overflow-x-auto rounded-xl border border-slate-850">
                      <table className="w-full text-left text-xs border-collapse">
                        <thead>
                          <tr className="bg-slate-950 text-slate-400 font-bold uppercase border-b border-slate-850">
                            <th className="py-3 px-4">Liaison de câblage requise</th>
                            <th className="py-3 px-4 text-center w-28">Forfait Unité</th>
                            <th className="py-3 px-4 text-center w-28">Suggéré (+20%)</th>
                            <th className="py-3 px-4 text-center w-36 bg-slate-900/40">Quantité Retenue</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-850">
                          {computedCablingList.map((cable) => (
                            <tr key={cable.key} className="hover:bg-slate-850/10 transition">
                              <td className="py-3 px-4 font-bold text-slate-200 text-left">{cable.label}</td>
                              <td className="py-3 px-4 text-center font-mono text-slate-500 font-bold">{cable.lengthUnit}</td>
                              <td className="py-3 px-4 text-center font-mono font-bold text-teal-400 bg-slate-950/20">{cable.autoQty} u.</td>
                              <td className="py-3 px-4 text-center bg-slate-950/40">
                                <div className="flex items-center justify-center gap-1.5">
                                  <input 
                                    type="number" 
                                    min="0"
                                    value={cable.finalQty}
                                    onChange={e => handleUpdateOverride(cable.key, e.target.value)}
                                    className="w-16 bg-slate-900 border border-slate-800 focus:border-teal-500 focus:ring-1 focus:ring-teal-500 rounded-xl font-mono font-bold text-center py-1 text-teal-300 outline-none"
                                  />
                                  <span className="text-[10px] text-slate-500 font-bold">u.</span>
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </section>
                </div>

              </div>
            )}

          </main>

          {/* TOAST NOTIFICATION SÉCURISÉ */}
          {showCopyToast && (
            <div className="fixed bottom-6 right-6 bg-slate-900 border border-teal-500/30 text-teal-300 px-4 py-3 rounded-xl shadow-2xl z-50 flex items-center gap-2.5 animate-fadeIn">
              <div className="bg-teal-500/15 p-1 rounded-full"><svg className="w-4 h-4 text-teal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg></div>
              <div><span className="text-xs font-bold block">Action confirmée !</span><span className="text-[10px] text-slate-400">{toastMessage}</span></div>
            </div>
          )}

          <footer className="border-t border-slate-900 py-4 text-center text-xs text-slate-500 w-full">
            <p>PatchMaster Live v5.5 — Système unifié de patch, colisage et câblage pour Sonarion et Fréquence.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
